server:
  port: 8080

spring:
  application:
    name: ep03-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/duoc_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:duoc_user}
    password: ${SPRING_DATASOURCE_PASSWORD:duoc_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    database-platform: ${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.MySQLDialect}
    show-sql: true
    properties:
      hibernate:
        format_sql: true

springdoc:
  api-docs:
    path: /api-docs

logging:
  level:
    root: INFO
    cl.duocuc: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# SonarQube configuration
sonar:
  host:
    url: ${SONAR_HOST_URL:http://localhost:9000}
  project:
    key: ep03-api
    name: ep03-api

# Snyk configuration
snyk:
  api: ${SNYK_API_TOKEN:}
  org: ${SNYK_ORG:}
